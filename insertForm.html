<h1 style="text-align: center; color: black;"><b>FORMULIR PENDAFTARAN CALON SISWA BARU SMA</b></h1>
<br>
    <table class="table table-striped">
        <form method="GET" action="insertProses.php">
            <h2 style="color:cornflowerblue; text-align: left;">BIODATA SISWA</h3>
            <tr>
                <td>A. No UN SMP/MTs/Sederajat </td>
                <td> <input type="text" name="un"> </td>
            </tr>
            <tr>
                <td>B. Nama Lengkap : </td>
                <td> <input type="text" name="nama"> </td>
            </tr>
            <tr>
                 <td>C. Jenis Kelamin : </td>
                 <td><input type="radio" name="jenis_kelamin" value="L"> Laki-Laki
                  <input type="radio" name="jenis_kelamin" value="P">Perempuan</td>
                 </td>
            <tr>
                  <td>&emsp; &emsp; Tempat Lahir </td>

            </tr>
            <tr>
                <td>&emsp; &emsp; Tanggal Lahir </td>

            <tr>

            </tr>
            <tr>
                <td>E. Alamat </td>

            </tr>
            <tr>

                <td><input type="text" name="kota" ></textarea><br></td>
            </tr>

            </tr>
            <tr>

                <td><input type="text" name="asal" ></textarea><br></td>
            </tr>
            <tr>
                <td>I. Agama </td>
                <td><input type="text" name="agama" ></textarea><br></td>
            </tr>
            <tr>
                <td>
                    <button type="submit" class="btn btn-primary" value="kirim">Submit</button>
                </td>
                
                
            </tr>
